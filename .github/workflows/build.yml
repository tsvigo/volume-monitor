name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ qtbase5-dev pkg-config libfuse2

      - name: Build
        run: |
          rcc resources.qrc -o qrc.cpp
          g++ -O2 -fPIC -o volume_monitor volume_monitor.cpp qrc.cpp $(pkg-config --cflags --libs Qt5Widgets Qt5Core)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: volume_monitor-linux-x64
          path: volume_monitor

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ qtbase5-dev pkg-config libfuse2 file

      - name: Build
        run: |
          rcc resources.qrc -o qrc.cpp
          g++ -O2 -fPIC -o volume_monitor volume_monitor.cpp qrc.cpp $(pkg-config --cflags --libs Qt5Widgets Qt5Core)

      - name: Get version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp volume_monitor AppDir/usr/bin/
          cp volume-monitor.desktop AppDir/usr/share/applications/
          cp icons/volume-monitor.png AppDir/usr/share/icons/hicolor/256x256/apps/
          sed -i 's|Icon=.*|Icon=volume-monitor|' AppDir/usr/share/applications/volume-monitor.desktop
          sed -i 's|Exec=.*|Exec=volume_monitor|' AppDir/usr/share/applications/volume-monitor.desktop

      - name: Build AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage -O linuxdeploy
          chmod +x linuxdeploy
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage -O linuxdeploy-plugin-qt
          chmod +x linuxdeploy-plugin-qt
          ./linuxdeploy --appdir AppDir --plugin qt --output appimage

      - name: Rename AppImage
        run: |
          ls -la *.AppImage
          mv *.AppImage VolumeMonitor-${{ steps.version.outputs.tag }}-x86_64.AppImage

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Volume Monitor ${{ steps.version.outputs.tag }}
          body: |
            ## Volume Monitor ${{ steps.version.outputs.tag }}

            Real-time system volume display with rainbow dial for Linux (PipeWire).

            ### Install (AppImage)
            ```bash
            chmod +x VolumeMonitor-*.AppImage
            ./VolumeMonitor-*.AppImage
            ```
            No dependencies needed — Qt5 bundled inside.

            ### Install (from source)
            ```bash
            sudo apt install qtbase5-dev
            g++ -O2 -fPIC -o volume_monitor volume_monitor.cpp $(pkg-config --cflags --libs Qt5Widgets Qt5Core)
            ```

            ### Requirements
            - Linux with PipeWire
          files: |
            VolumeMonitor-${{ steps.version.outputs.tag }}-x86_64.AppImage
            volume_monitor
          draft: false
          prerelease: false
